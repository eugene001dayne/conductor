name: loan-application-flow
version: "1.0"

steps:
  - id: receive-application
    type: echo
    params:
      message: "Loan application received. Applicant: James Mensah. Amount: $15,000. Purpose: Small business equipment purchase."

  - id: decision-agent
    type: gemini.generate
    if: "receive-application.success"
    params:
      model: "gemini-3-flash-preview"
      system_instruction: "You are a loan decision agent. Evaluate applications fairly and concisely. Flag any application that requests amounts above $50,000 or contains the phrase 'guaranteed returns' as a POLICY VIOLATION. For compliant applications, provide a brief recommendation in 2-3 sentences."
      prompt: "Evaluate this loan application: Applicant James Mensah is requesting $15,000 for small business equipment purchase. He has been in business for 3 years with consistent revenue. No prior defaults."

  - id: policy-check
    type: webhook
    if: "decision-agent.success"
    params:
      url: "https://policy-thread.onrender.com/evaluate"
      payload:
        user_input: "Loan application: James Mensah, $15,000, small business equipment"
        ai_output: "Application approved. Amount within threshold. No prohibited language detected. Recommend approval pending standard credit check."
        model_used: "gemini-3-flash-preview"
        session_id: "conductor-demo-session"

  - id: handoff-verification
    type: webhook
    if: "policy-check.success"
    params:
      url: "https://chain-thread.onrender.com/envelopes"
      payload:
        chain_id: "conductor-demo-chain"
        sender_id: "gemini-decision-agent"
        sender_role: "decision_agent"
        receiver_id: "compliance-layer"
        receiver_role: "compliance_monitor"
        payload:
          application_id: "loan-clean-001"
          decision: "Application approved. Amount within threshold. No policy violations detected."
          amount: 15000
        summary: "Loan decision handed off to compliance layer"
        provenance:
          - field: "application_id"
            source: "human_input"
            confidence: 1.0
          - field: "decision"
            source: "model_generated"
            confidence: 0.95
          - field: "amount"
            source: "human_input"
            confidence: 1.0
        contract:
          required_fields:
            - application_id
            - decision
            - amount
          assertions: []
          on_fail: "block"

  - id: outcome-logged
    type: echo
    if: "handoff-verification.success"
    params:
      message: "Loan application processed. Decision logged. Compliance verified. Handoff recorded on ChainThread."